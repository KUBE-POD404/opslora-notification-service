name: Reusable Dependency Scan

on:
  workflow_call:
    outputs:
      snyk_status:
        description: "Snyk outcome"
        value: ${{ jobs.snyk-scan.outputs.snyk_status }}
      notify_tool:
        description: "Tool name for notification"
        value: ${{ jobs.snyk-scan.outputs.notify_tool }}
      notify_title:
        description: "Notification title"
        value: ${{ jobs.snyk-scan.outputs.notify_title }}
      notify_summary:
        description: "Notification summary"
        value: ${{ jobs.snyk-scan.outputs.notify_summary }}

jobs:
  snyk-scan:
    runs-on: ubuntu-latest

    outputs:
      snyk_status: ${{ steps.set_outputs.outputs.snyk_status }}
      notify_tool: ${{ steps.set_outputs.outputs.notify_tool }}
      notify_title: ${{ steps.set_outputs.outputs.notify_title }}
      notify_summary: ${{ steps.set_outputs.outputs.notify_summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Snyk to check for vulnerabilities
        id: snyk-check
        uses: snyk/actions/python@master
        with:
          args: --file=requirements.txt --severity-threshold=high --monitor --org=${{ secrets.SNYK_ORG }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Show Snyk outcome
        run: |
          echo "Snyk outcome: ${{ steps.snyk-check.outcome }}"

      - name: Set normalized outputs
        id: set_outputs
        shell: bash
        run: |
          echo "snyk_status=${{ steps.snyk-check.outcome }}" >> "$GITHUB_OUTPUT"
          echo "notify_tool=snyk" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.snyk-check.outcome }}" = "failure" ]; then
            echo "notify_title=Snyk Security Scan Failed" >> "$GITHUB_OUTPUT"
            echo "notify_summary=Dependency vulnerabilities or policy issues were found." >> "$GITHUB_OUTPUT"
          else
            echo "notify_title=Snyk Passed" >> "$GITHUB_OUTPUT"
            echo "notify_summary=No blocking Snyk issues were found." >> "$GITHUB_OUTPUT"
          fi