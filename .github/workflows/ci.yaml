name: Notification Service CI Pipeline

on:
  push:
    branches:
      - refactor/notification-service

concurrency:
  group: opslora-notification-service-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  get-email:
    runs-on: ubuntu-latest
    outputs:
      email: ${{ steps.author.outputs.email }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: author
        run: |
          SHA="${{ github.sha }}"
          EMAIL=$(git show -s --format='%ae' "$SHA")
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"

  sonar-scan:
    uses: ./.github/workflows/ci_sonar_scan.yaml
    secrets: inherit

  snyk-scan:
    needs: sonar-scan
    if: ${{ needs.sonar-scan.outputs.quality_gate_status == 'PASSED' }}
    uses: ./.github/workflows/ci_snyk_scan.yaml
    secrets: inherit

  notify:
    needs: [sonar-scan, snyk-scan, get-email]
    if: ${{ always() && (needs.sonar-scan.outputs.quality_gate_status == 'FAILED' || needs.snyk-scan.outputs.snyk_status == 'failure') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send Notification
        uses: ./.github/actions/send-notification
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ needs.sonar-scan.outputs.quality_gate_status == 'FAILED' && needs.sonar-scan.outputs.notify_summary || needs.snyk-scan.outputs.notify_summary }}
          author: ${{ github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          mail_from: ${{ secrets.MAIL_FROM }}
          mail_to: ${{ needs.get-email.outputs.email }}
          slack_webhook: ${{ secrets.SLACK_INCOMING_WEBHOOK }}
          tool: ${{ needs.sonar-scan.outputs.quality_gate_status == 'FAILED' && 'sonar' || 'snyk' }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          sonar_host_url: ${{ secrets.SONAR_HOST_URL }}
          sonar_project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          snyk_org: ${{ secrets.SNYK_ORG }}
          snyk_project_id: ${{ secrets.SNYK_PROJECT_ID }}