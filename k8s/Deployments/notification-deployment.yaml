apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deployment
  namespace: opslora-test-ns
  labels:
    app: notification

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notification-microservice

  template:
    metadata:
      labels:
        app: notification-microservice

    spec:
      containers:
        - name: notification-container
          image: kubectlandchill/sales-notification-service:v1.0.1

          ports:
            - containerPort: 3000

          envFrom:
            - secretRef:
                name: notification-secret
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-config

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "250Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"

          readinessProbe:
            httpGet:
              path: /api/notification/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/notification/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - rabbitmq
              topologyKey: "kubernetes.io/hostname"

        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - notification-microservice
              topologyKey: "kubernetes.io/hostname"

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1